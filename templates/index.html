<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<style>
    .text_white{
        color: white;
    }
</style>
<body style="background-color: black;">
    <nav class="navbar" style="background-color: beige;">
        <div class="container-fluid">
            <a class="navbar-brand"><h2 style="color: blue;">BookWise</h2></a>
            <div class="navbar-nav d-flex flex-row">
                <a class="nav-link" href="/" style="margin-right: 50px;">Home</a>
                <a class="nav-link" href="/recommend" style="margin-right: 30px;">Recommend</a>
                <a class="nav-link">Contact Us</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text_white" style="font-size: 40px; margin-top: 30px;">Top 50 books</h1>
            </div>

            {% for i in range(bookname|length) %}

            <div class="col-md-3" style="margin-top: 30px;">
                <div class="card">
                <div class="card-body">
                    <img class="card-image-top" src="{{ image[i] }}">
                    <p class="text_white" style="margin-top: 10px; color: black;">{{ bookname[i] }}</p>
                    <p class="text_white" style="color: black;">{{ author[i] }}</p>
                    <p class="text_white" style="color: black;">Votes : {{ votes[i] }}</p>
                    <p class="text_white" style="color: black;">Rating : {{ ratings[i] }}</p>
                </div>
            </div>
        </div>

            {% endfor %}

        </div>
    </div>
</body>
</html>
