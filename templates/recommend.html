<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Recommender System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<style>
    .text_white{
        color: white;
    }
</style>
<body style="background-color: black;">
    <nav class="navbar" style="background-color: beige;">
        <div class="container-fluid">
            <a class="navbar-brand">My book recommender</a>
            <div class="navbar-nav d-flex flex-row">
                <a class="nav-link" href="/" style="margin-right: 50px;">Home</a>
                <a class="nav-link" href="/recommend" style="margin-right: 30px;">Recommend</a>
                <a class="nav-link">Contact Us</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text_white" style="font-size: 40px; margin-top: 30px;">Recommend Books</h1>
                <form action="/recommend_books" method="post">
                    <input type="text" name="user_input" class="form-control form-control-lg"><br>
                    <input type="submit" class="btn btn-lg btn-warning">
                </form>
                
            </div>

            {% if data %}

                {% for i in data %}

                <div class="col-md-3" style="margin-top: 30px;">
                    <div class="card">
                    <div class="card-body">
                        <img class="card-image-top" src="{{i[2]}}">
                        <p class="text_white" style="margin-top: 10px; color: black;">{{ i[0] }}</p>
                        <h4 class="text_white" style="color: black;">{{ i[1] }}</h4>
                    </div>
                </div>
            </div>

                {% endfor %}
            

            {% endif %}

            

        </div>
    </div>
</body>
</html>
